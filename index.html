<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:#ede6d8;
  --wb:#f2ebe3;--wb2:#e8ddd2;--wb3:#d9cbbf;--wb4:#b89f8a;--wb5:#8a6650;--wb6:#5c3a28;--wb7:#3a1f10;
  --wt:#3a1f10;--wt2:#5c3a28;--wt3:#8a6650;
  --sel:#7a3a1a;--sel-bg:#f0ddd0;
  --sel-disj:#b8860b;--sel-disj-bg:#fdf5c0;
  --drop-bg:#c8e6cc;--drop-bg2:#e8f5e9;--drop-b:#3a7d44;
  --hole:#c4a898;--hole2:#8a6650;
  --bad-bg:#fde8e8;--bad-b:#c0392b;
  --bar:#e0d4c4;--bar-h:#c8b99a;--bar-a:#5c3a28;
  --shadow:rgba(58,31,16,0.15);
  --row-bar-w:28px;--col-bar-h:22px;--col-fixed-w:140px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-page:#181410;
    --wb:#221e18;--wb2:#2c2820;--wb3:#38302a;--wb4:#56463a;--wb5:#7a6252;--wb6:#9a7e68;--wb7:#c8aa90;
    --wt:#e8ddd0;--wt2:#c0a080;--wt3:#8a6a50;
    --sel:#c8a060;--sel-bg:#38280e;
    --sel-disj:#c8a820;--sel-disj-bg:#2c2808;
    --drop-bg:#182e1c;--drop-bg2:#121a14;--drop-b:#4aaa68;
    --hole:#342c26;--hole2:#564638;
    --bad-bg:#2e1212;--bad-b:#d06050;
    --bar:#2c2820;--bar-h:#38302a;--bar-a:#7a6252;
    --shadow:rgba(0,0,0,0.45);
  }
}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:var(--wt);background:var(--bg-page);min-height:100vh;padding:2rem}
#app{max-width:1100px;margin:0 auto}
.wrap{padding:14px}
.sz-num::-webkit-inner-spin-button,.sz-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
h1{font-size:18px;font-weight:600;color:var(--wt2);margin-bottom:14px}
.toolbar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;padding:8px 10px;background:var(--wb2);border:1px solid var(--wb4);border-radius:7px;margin-bottom:10px}
.flex-break{display:none;width:100%;height:0}
@media(max-width:860px){
  .sw-wrap.ml{margin-left:0}
  .export-group{margin-left:0!important}
  .toolbar .tb-sep{display:none}
  .sz-row .sz-sep{display:none}
  .flex-break{display:block}
}
.tb-sep{width:1px;height:18px;background:var(--wb4);margin:0 3px;flex-shrink:0}
.tb-btn{padding:4px 9px;border:1px solid var(--wb4);border-radius:5px;background:var(--wb);color:var(--wt);cursor:pointer;font-size:13px;line-height:1.4;user-select:none;font-family:inherit;position:relative;transition:background .1s;display:flex;align-items:center;justify-content:center}
.tb-btn:hover{background:var(--wb3)}
.tb-btn.active-pop{background:var(--wb3);border-color:var(--wb5)}
.sz-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;font-size:13px;color:var(--wt2);flex-wrap:wrap}
.sz-btn{padding:2px 9px;border:1px solid var(--wb4);border-radius:5px;background:var(--wb);color:var(--wt);cursor:pointer;font-size:13px;line-height:1.6;font-family:inherit;position:relative;transition:background .1s}
.sz-btn:hover{background:var(--wb3)}
.sz-sep{width:1px;height:22px;background:var(--wb4);margin:0 4px;flex-shrink:0;align-self:center}
.sw-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--wt2);position:relative}
.sw-wrap.ml{margin-left:auto}
.sw-track{width:32px;height:17px;border-radius:9px;background:var(--wb4);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;border:1px solid var(--wb5)}
.sw-track.on{background:var(--wb6)}
.sw-thumb{position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:var(--wb);transition:left .15s}
.sw-track.on .sw-thumb{left:17px}
.tip{position:absolute;background:var(--wb7);color:var(--bg-page);font-size:11px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;z-index:200;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);transition:opacity .1s .5s;border:1px solid var(--wb5)}
.tb-btn:hover .tip,.sz-btn:hover .tip,.sw-track:hover .tip{opacity:1}
#save-indicator{font-size:11px;color:var(--wt3);opacity:0;transition:opacity .4s;margin-left:4px;user-select:none;flex-shrink:0}
#save-indicator.show{opacity:1}

/* align icons — SVG lines */
.align-icon{display:flex;flex-direction:column;gap:2px;width:14px;pointer-events:none}
.align-icon span{display:block;height:1.5px;background:currentColor;border-radius:1px}

/* italic with serif */
.serif-i{font-family:Georgia,Palatino,"Times New Roman",serif;font-style:italic;font-size:14px;font-weight:700}

/* colour swatch button */
.color-btn-wrap{position:relative}
.color-indicator{width:12px;height:3px;border-radius:1px;margin-top:2px;background:transparent}

/* colour picker popover */
.color-pop{position:fixed;display:none;background:var(--wb);border:1px solid var(--wb4);border-radius:8px;padding:8px;box-shadow:0 4px 14px var(--shadow);z-index:350;width:84px}
.color-pop.show{display:block}
.color-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.15);border-color:var(--wb5)}
.color-swatch.clear{background:var(--wb2)!important;border:2px dashed var(--wb4);position:relative}
.color-swatch.clear::after{content:'×';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--wt3)}

/* export dropdown */
.export-pop{position:fixed;display:none;flex-direction:column;gap:2px;background:var(--wb);border:1px solid var(--wb4);border-radius:8px;padding:6px;box-shadow:0 4px 14px var(--shadow);z-index:350;min-width:160px}
.export-pop.show{display:flex}
.export-pop-btn{display:flex;align-items:center;gap:8px;padding:5px 10px;border:none;background:none;color:var(--wt);cursor:pointer;font-size:13px;border-radius:5px;font-family:inherit;white-space:nowrap;text-align:left;position:relative}
.export-pop-btn:hover{background:var(--wb2)}
.export-pop-btn .tip{bottom:auto;top:50%;transform:translateY(-50%);left:calc(100% + 6px)}

/* table grid */
.tbl-outer{overflow:auto;border:1px solid var(--wb4);border-radius:4px;position:relative;max-height:520px}
.tbl-grid{display:grid;width:100%}
.tbl-grid.endless{width:auto}
.g-corner{background:var(--bar);border-right:1px solid var(--wb4);border-bottom:1px solid var(--wb4);position:sticky;top:0;left:0;z-index:4}
.g-col-hdr{background:var(--bar);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--wt2);cursor:pointer;border-right:1px solid var(--wb4);border-bottom:1px solid var(--wb4);user-select:none;overflow:hidden;position:sticky;top:0;z-index:3;transition:background .1s}
.g-col-hdr:hover{background:var(--bar-h)}
.g-col-hdr.active{background:var(--bar-a);color:var(--wb)}
.g-row-hdr{background:var(--bar);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--wt2);cursor:pointer;border-right:1px solid var(--wb4);border-bottom:1px solid var(--wb4);user-select:none;overflow:hidden;position:sticky;left:0;z-index:2;transition:background .1s}
.g-row-hdr:hover{background:var(--bar-h)}
.g-row-hdr.active{background:var(--bar-a);color:var(--wb)}
.g-cell{border-right:1px solid var(--wb4);border-bottom:1px solid var(--wb4);position:relative;background:var(--wb);min-width:0}
.g-cell.hdr{background:var(--wb3)}
.g-cell.sel{outline:2px solid var(--sel);outline-offset:-2px;z-index:1}
.g-cell.sel .ci{background:color-mix(in srgb,var(--sel-bg) 25%,transparent)}
.g-cell.hdr.sel .ci{background:color-mix(in srgb,var(--sel-bg) 25%,transparent)}
.g-cell.sel-disj{outline:2px solid var(--sel-disj);outline-offset:-2px;z-index:1}
.g-cell.sel-disj .ci{background:color-mix(in srgb,var(--sel-disj-bg) 25%,transparent)}
.g-cell.sel-disj .handle{display:none!important}
.g-cell.drag-src{outline:2px dashed var(--hole2);outline-offset:-2px}
.g-cell.drag-src .ci{background:var(--hole)!important;color:transparent!important;user-select:none}
.g-cell.drop-primary{outline:2px solid var(--drop-b);outline-offset:-2px}
.g-cell.drop-primary .ci{background:color-mix(in srgb,var(--drop-bg) 70%,transparent)!important}
.g-cell.drop-secondary{outline:1px solid var(--drop-b);outline-offset:-1px}
.g-cell.drop-secondary .ci{background:color-mix(in srgb,var(--drop-bg2) 70%,transparent)!important}
.ci{padding:6px 26px 6px 8px;min-height:32px;outline:none;cursor:text;word-break:break-word;white-space:pre-wrap;color:var(--wt);width:100%;height:100%}
.ci:focus{outline:none}
.handle{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:14px;height:20px;display:none;flex-direction:column;justify-content:center;align-items:center;gap:3px;cursor:grab;z-index:3;opacity:0.5}
.handle:hover{opacity:1}
.handle span{display:block;width:8px;height:1.5px;background:var(--wt2);border-radius:1px}
.g-cell:hover .handle{display:flex}
.ghost-grid{position:fixed;pointer-events:none;z-index:9999;display:grid;gap:2px;transform:rotate(1.5deg) scale(1.04);opacity:0.95;box-shadow:0 8px 20px var(--shadow)}
.ghost-cell{border-radius:5px;background:var(--wb);border:1.5px solid var(--sel);padding:5px 8px;font-size:13px;color:var(--wt);white-space:pre-wrap;word-break:break-word;min-height:28px;overflow:hidden}
.ghost-grid.bad .ghost-cell{border-color:var(--bad-b);background:var(--bad-bg);color:var(--bad-b)}
@keyframes flyTo{from{transform:var(--fly-from)}to{transform:translate(0,0)}}
.ci-flying{animation:flyTo 220ms cubic-bezier(.22,.8,.45,1) forwards}
.rc-pop{position:fixed;display:none;flex-direction:column;gap:4px;background:var(--wb);border:1px solid var(--wb4);border-radius:8px;padding:6px;box-shadow:0 4px 14px var(--shadow);z-index:300}
.rc-pop.show{display:flex}
.rc-pop-btn{display:flex;align-items:center;gap:7px;padding:5px 10px;border:none;background:none;color:var(--wt);cursor:pointer;font-size:13px;border-radius:5px;font-family:inherit;white-space:nowrap;transition:background .1s}
.rc-pop-btn:hover{background:var(--wb2)}
.rc-pop-btn .ico{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rc-pop-btn .ico.add{background:var(--wb6);color:var(--wb)}
.rc-pop-btn .ico.del{background:#8a3020;color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:var(--wb);border:1px solid var(--wb4);border-radius:10px;padding:24px;max-width:340px;width:90%;box-shadow:0 8px 32px var(--shadow)}
.dialog h2{font-size:15px;font-weight:600;color:var(--wt);margin-bottom:8px}
.dialog p{font-size:13px;color:var(--wt2);margin-bottom:18px;line-height:1.5}
.dialog-btns{display:flex;gap:8px;justify-content:flex-end}
.dialog-btns button{padding:5px 16px;border-radius:6px;border:1px solid var(--wb4);cursor:pointer;font-size:13px;font-family:inherit;transition:background .1s}
.btn-cancel{background:var(--wb);color:var(--wt)}
.btn-cancel:hover{background:var(--wb2)}
.btn-danger{background:#8a3020;color:#fff;border-color:#8a3020}
.btn-danger:hover{background:#6b2010}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--wb2);border:1px solid var(--wb4);border-radius:7px;padding:6px 14px;font-size:13px;color:var(--wt);opacity:0;pointer-events:none;transition:opacity .18s;white-space:nowrap;z-index:400}
.toast.show{opacity:1}
#file-input{display:none}
</style>
</head>
<body>
<div id="app"><div class="wrap">
    <div class="sz-row">
    <span>Rows</span>
    <button class="sz-btn" onclick="chgSize('r',-1)">−<span class="tip">Remove last row</span></button>
    <input id="rn" type="number" min="1" max="99" value="4" onchange="setSize('r',this)" style="width:38px;padding:1px 4px;border:1px solid var(--wb4);border-radius:4px;background:var(--wb);color:var(--wt);font-size:13px;font-family:inherit;text-align:center;-moz-appearance:textfield" class="sz-num">
    <button class="sz-btn" onclick="chgSize('r',1)">+<span class="tip">Add row</span></button>
    <span style="margin-left:4px">Columns</span>
    <button class="sz-btn" onclick="chgSize('c',-1)">−<span class="tip">Remove last column</span></button>
    <input id="cn" type="number" min="1" max="99" value="4" onchange="setSize('c',this)" style="width:38px;padding:1px 4px;border:1px solid var(--wb4);border-radius:4px;background:var(--wb);color:var(--wt);font-size:13px;font-family:inherit;text-align:center;-moz-appearance:textfield" class="sz-num">
    <button class="sz-btn" onclick="chgSize('c',1)">+<span class="tip">Add column</span></button>
    <div class="sz-sep"></div>
    <div class="flex-break"></div>
    <button class="sz-btn" onclick="importFromFile()">Import file<span class="tip">Import CSV, TSV, or HTML table from a file</span></button>
    <button class="sz-btn" onclick="importFromClipboard()">Import clipboard<span class="tip">Paste CSV, TSV, or HTML table from clipboard</span></button>
    <button class="sz-btn" onclick="confirmNewTable()">New table<span class="tip">Start fresh with an empty 4×4 table</span></button>
    <div class="sz-sep"></div>
    <button class="sz-btn" id="undo-btn" onclick="doUndo()" disabled title="">↩ Undo<span class="tip">Undo last action (Ctrl+Z)</span></button>
    <span id="save-indicator">Saved ✓</span>
  </div>
  <div class="toolbar">
    <!-- Bold -->
    <button class="tb-btn" onclick="applyFmt('bold')"><b>B</b><span class="tip">Bold</span></button>
    <!-- Italic — serif font so it looks like a real italic I -->
    <button class="tb-btn" onclick="applyFmt('italic')"><span class="serif-i">I</span><span class="tip">Italic</span></button>
    <div class="tb-sep"></div>
    <!-- Align — line-based icons like office suites -->
    <button class="tb-btn" onclick="applyAlign('left')" title="Align left">
      <span class="align-icon">
        <span style="width:100%"></span><span style="width:75%"></span><span style="width:100%"></span><span style="width:60%"></span>
      </span><span class="tip">Align left</span>
    </button>
    <button class="tb-btn" onclick="applyAlign('center')" title="Align center">
      <span class="align-icon" style="align-items:center">
        <span style="width:100%"></span><span style="width:70%"></span><span style="width:100%"></span><span style="width:55%"></span>
      </span><span class="tip">Align center</span>
    </button>
    <button class="tb-btn" onclick="applyAlign('right')" title="Align right">
      <span class="align-icon" style="align-items:flex-end">
        <span style="width:100%"></span><span style="width:75%"></span><span style="width:100%"></span><span style="width:60%"></span>
      </span><span class="tip">Align right</span>
    </button>
    <div class="tb-sep"></div>
    <!-- Text colour -->
    <div class="color-btn-wrap" id="tc-wrap">
      <button class="tb-btn" id="tc-btn" onclick="toggleColorPop('text')" style="flex-direction:column;gap:1px;padding:3px 7px">
        <b style="font-size:13px;line-height:1">A</b>
        <div class="color-indicator" id="tc-indicator"></div>
        <span class="tip">Text colour</span>
      </button>
    </div>
    <!-- Cell colour -->
    <div class="color-btn-wrap" id="cc-wrap">
      <button class="tb-btn" id="cc-btn" onclick="toggleColorPop('cell')" style="flex-direction:column;gap:1px;padding:3px 7px">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:block">
          <rect x="1" y="1" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
        <div class="color-indicator" id="cc-indicator"></div>
        <span class="tip">Cell colour</span>
      </button>
    </div>
    <!-- Colour popover (shared, repositioned) -->
    <div class="color-pop" id="color-pop">
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="flex-break"></div>
    <div class="tb-sep"></div>
    <div class="sw-wrap">
      <span>Header</span>
      <div class="sw-track on" id="sw-hdr" onclick="togHdr()"><div class="sw-thumb"></div><span class="tip">Toggle header row</span></div>
    </div>
    <div class="tb-sep"></div>
    <div class="sw-wrap">
      <span>Fit</span>
      <div class="sw-track" id="sw-fit" onclick="togFit()"><div class="sw-thumb"></div><span class="tip">Fit: columns share width · Endless: fixed 140px, scroll horizontally</span></div>
      <span>Endless</span>
    </div>
    
    <div class="export-group" style="display:flex;gap:5px;margin-left:auto">
      <div style="position:relative">
        <button class="tb-btn" id="export-btn" onclick="toggleExportPop()">Export to…<span class="tip">Choose export format</span></button>
      </div>
      <div style="position:relative">
        <button class="tb-btn" id="copy-btn" onclick="toggleCopyPop()">Copy as…<span class="tip">Copy to clipboard in a format</span></button>
      </div>
    </div>
    <div class="export-pop" id="copy-pop">
      <button class="export-pop-btn" onclick="copyAs('csv');closeCopyPop()">CSV<span class="tip">Comma-separated values</span></button>
      <button class="export-pop-btn" onclick="copyAs('tsv');closeCopyPop()">TSV<span class="tip">Tab-separated values</span></button>
      <button class="export-pop-btn" onclick="copyAs('md');closeCopyPop()">Markdown<span class="tip">Markdown table with alignment</span></button>
      <button class="export-pop-btn" onclick="copyAs('html');closeCopyPop()">HTML<span class="tip">HTML table with styles and colours</span></button>
      <button class="export-pop-btn" onclick="copyAs('cells');closeCopyPop()">Cells<span class="tip">Paste directly into a spreadsheet with styles and colours</span></button>
    </div>
    <div class="export-pop" id="export-pop">
      <button class="export-pop-btn" onclick="doExport('csv');closeExportPop()">CSV<span class="tip">Comma-separated values</span></button>
      <button class="export-pop-btn" onclick="doExport('tsv');closeExportPop()">TSV<span class="tip">Tab-separated values</span></button>
      <button class="export-pop-btn" onclick="doExport('md');closeExportPop()">Markdown<span class="tip">Markdown table with alignment</span></button>
      <button class="export-pop-btn" onclick="doExport('html');closeExportPop()">HTML<span class="tip">HTML table with styles and colours</span></button>
    </div>
  </div>
  <div class="tbl-outer" id="tbl-outer">
    <div class="tbl-grid" id="tbl-grid"></div>
  </div>
</div></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h2 id="dlg-title"></h2>
    <p id="dlg-body"></p>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeDialog()">Cancel</button>
      <button id="dlg-ok" class="btn-danger" onclick="dialogOk()">Confirm</button>
    </div>
  </div>
</div>
<input type="file" id="file-input" accept=".csv,.tsv,.txt,.html,.htm" onchange="handleFileInput(event)">
<div class="rc-pop" id="rc-pop"></div>
<div class="toast" id="toast"></div>

<script>
const SAVE_KEY='table_builder_v2';
const UNDO_LIMIT=50;
let undoStack=[];   // array of {NR,NC,hasHdr,fitMode,cells} snapshots
let undoPointer=-1; // points to current position in stack
let undoPaused=false; // prevents recording while restoring
let NR=4,NC=4,hasHdr=true,fitMode=true;
let sel=new Set(),lastSel=null,selAnchor=null,selLive=null;
let dragActive=false,dragSelKeys=[],dragGhostEl=null,dragTargetCell=null,dragOffR=0,dragOffC=0;
let isSelDrag=false,selDragStart=null;
let activePop=null,pendingDialogFn=null,activeColorPop=null;
let scrollRaf=null,scrollVx=0,scrollVy=0;
const cellEditing=new WeakMap();
let saveTimer=null,saveFlashTimer=null;
const SCROLL_ZONE=48,SCROLL_MAX=18;

const grid=document.getElementById('tbl-grid');
const outer=document.getElementById('tbl-outer');
const pop=document.getElementById('rc-pop');
const colorPop=document.getElementById('color-pop');
const colorGrid=document.getElementById('color-grid');
const COL_LABELS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

const PALETTE=[
  '#c0392b','#e67e22','#f1c40f',
  '#27ae60','#2980b9','#8e44ad',
  '#1abc9c','#2c3e50','#ecf0f1',
];

// Build colour picker grid
function buildColorGrid(mode){
  colorGrid.innerHTML='';
  PALETTE.forEach(hex=>{
    const s=document.createElement('div');
    s.className='color-swatch';
    s.style.background=hex;
    s.title=hex;
    s.addEventListener('mousedown',e=>{e.preventDefault();applyColor(mode,hex);closeColorPop();});
    colorGrid.appendChild(s);
  });
  const clr=document.createElement('div');
  clr.className='color-swatch clear';
  clr.title='Clear colour';
  clr.addEventListener('mousedown',e=>{e.preventDefault();applyColor(mode,null);closeColorPop();});
  colorGrid.appendChild(clr);
}

function toggleColorPop(mode){
  if(activeColorPop===mode){closeColorPop();return;}
  closeColorPop();
  activeColorPop=mode;
  buildColorGrid(mode);
  const btn=document.getElementById(mode==='text'?'tc-btn':'cc-btn');
  btn.classList.add('active-pop');
  const rect=btn.getBoundingClientRect();
  colorPop.style.left=rect.left+'px';
  colorPop.style.top=(rect.bottom+4)+'px';
  colorPop.classList.add('show');

function copyAs(type){
  const d=getRows();let content='';
  if(type==='csv'){content=d.map(r=>r.map(escCSV).join(',')).join('\n');}
  else if(type==='md'){content=buildMD();}
  else if(type==='html'){content=buildHTML();}
  else if(type==='tsv'){content=d.map(r=>r.join('\t')).join('\n');}
  else if(type==='cells'){
    const tsv=d.map(r=>r.join('\t')).join('\n');
    const ho='<table>'+d.map((r,ri)=>'<tr>'+r.map((v,ci2)=>{const tag=(ri===0&&hasHdr)?'th':'td';return`<${tag}${csaFull(gCI(ri,ci2),gCell(ri,ci2))}>${v}</${tag}>`;}).join('')+'</tr>').join('')+'</table>';
    navigator.clipboard.write([new ClipboardItem({'text/plain':new Blob([tsv],{type:'text/plain'}),'text/html':new Blob([ho],{type:'text/html'})})]).then(()=>toast('Copied as cells')).catch(()=>navigator.clipboard.writeText(tsv).then(()=>toast('Copied')));
    return;
  }
  if(content)navigator.clipboard.writeText(content).then(()=>toast('Copied')).catch(()=>toast('Failed'));
}

function lightenHex(hex){
  // mix hex with white at 30% — gives a readable pastel tint
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lr=Math.round(r*0.35+255*0.65),lg=Math.round(g*0.35+255*0.65),lb=Math.round(b*0.35+255*0.65);
  return '#'+[lr,lg,lb].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function applyColor(mode,hex){pushUndo();
  sel.forEach(k=>{
    const[r,c]=pk(k);const cell=gCell(r,c);const d=gCI(r,c);if(!cell||!d)return;
    if(mode==='text'){d.style.color=hex||'';}
    else{
      // store original hex on dataset for save/restore, display lightened tint
      if(hex){cell.dataset.cellColor=hex;cell.style.background=lightenHex(hex);}
      else{delete cell.dataset.cellColor;cell.style.background='';}
    }
  });
  updateColorIndicators();
  scheduleSave();
}

function updateColorIndicators(){
  if(sel.size===0)return;
  const[r,c]=pk([...sel][0]);
  const d=gCI(r,c);const cell=gCell(r,c);
  document.getElementById('tc-indicator').style.background=d?d.style.color||'transparent':'transparent';
  document.getElementById('cc-indicator').style.background=cell?(cell.dataset.cellColor||'transparent'):'transparent';
}

// ── Persistence ───────────────────────────────────────────────────────────────
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,600);}

function pushUndo(){
  if(undoPaused)return;
  // Truncate any forward history
  undoStack=undoStack.slice(0,undoPointer+1);
  undoStack.push({NR,NC,hasHdr,fitMode,cells:snap()});
  if(undoStack.length>UNDO_LIMIT)undoStack.shift();
  undoPointer=undoStack.length-1;
  updateUndoBtn();
}

function doUndo(){
  if(undoPointer<=0)return;
  undoPointer--;
  restoreSnapshot(undoStack[undoPointer]);
}

function restoreSnapshot(s){
  undoPaused=true;
  NR=s.NR;NC=s.NC;hasHdr=s.hasHdr;fitMode=s.fitMode;
  build(true);
  if(s.cells)applySnap(s.cells,true);
  clearSel();scheduleSave();
  undoPaused=false;
  updateUndoBtn();
}

function updateUndoBtn(){
  const btn=document.getElementById('undo-btn');
  if(!btn)return;
  btn.disabled=undoPointer<=0;
}
function saveNow(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({NR,NC,hasHdr,fitMode,cells:snap()}));}catch(e){}
  const el=document.getElementById('save-indicator');
  el.classList.add('show');clearTimeout(saveFlashTimer);
  saveFlashTimer=setTimeout(()=>el.classList.remove('show'),1800);
}
function loadSaved(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}

// ── Core ──────────────────────────────────────────────────────────────────────
function key(r,c){return r+','+c}
function pk(k){const p=k.split(',');return[+p[0],+p[1]]}
function gCell(r,c){return grid.querySelector(`[data-r="${r}"][data-c="${c}"]`);}
function gCI(r,c){const t=gCell(r,c);return t?t.querySelector('.ci'):null;}
function isRectSel(){
  if(sel.size<=1)return true;
  const arr=[...sel].map(pk);
  const minR=Math.min(...arr.map(p=>p[0])),maxR=Math.max(...arr.map(p=>p[0]));
  const minC=Math.min(...arr.map(p=>p[1])),maxC=Math.max(...arr.map(p=>p[1]));
  return sel.size===(maxR-minR+1)*(maxC-minC+1);
}

// ── Build ─────────────────────────────────────────────────────────────────────
function setGridTemplate(){
  const cw=fitMode?'1fr':'var(--col-fixed-w)';
  grid.style.gridTemplateColumns='var(--row-bar-w) '+Array(NC).fill(cw).join(' ');
  grid.style.gridTemplateRows='var(--col-bar-h) '+Array(NR).fill('auto').join(' ');
  grid.className=fitMode?'tbl-grid':'tbl-grid endless';
  grid.style.width=fitMode?'100%':(28+NC*140)+'px';
}
function build(skipSave){
  const prev=snap();grid.innerHTML='';setGridTemplate();
  const corner=document.createElement('div');
  corner.className='g-corner';corner.style.gridColumn='1';corner.style.gridRow='1';
  grid.appendChild(corner);
  for(let c=0;c<NC;c++){
    const el=document.createElement('div');el.className='g-col-hdr';
    el.style.gridColumn=String(c+2);el.style.gridRow='1';
    el.textContent=COL_LABELS[c]||String(c+1);el.dataset.col=c;
    el.addEventListener('click',e=>{e.stopPropagation();openPop('col',c,el);});
    grid.appendChild(el);
  }
  for(let r=0;r<NR;r++){
    const rh=document.createElement('div');rh.className='g-row-hdr';
    rh.style.gridColumn='1';rh.style.gridRow=String(r+2);
    rh.textContent=String(r+1);rh.dataset.row=r;
    rh.addEventListener('click',e=>{e.stopPropagation();openPop('row',r,rh);});
    grid.appendChild(rh);
    for(let c=0;c<NC;c++){
      const cell=document.createElement('div');
      cell.className='g-cell'+(r===0&&hasHdr?' hdr':'');
      cell.style.gridColumn=String(c+2);cell.style.gridRow=String(r+2);
      cell.dataset.r=r;cell.dataset.c=c;
      const pv=prev[key(r,c)];
      if(pv&&pv.bg){cell.dataset.cellColor=pv.bg;cell.style.background=lightenHex(pv.bg);}
      const d=document.createElement('div');d.className='ci';d.contentEditable='true';
      if(pv){d.innerHTML=pv.h||'';d.style.textAlign=pv.a||'';d.style.fontWeight=pv.fw||'';d.style.fontStyle=pv.fs||'';d.style.color=pv.tc||'';}
      d.addEventListener('mousedown',onCIDown);d.addEventListener('mouseover',onCIOver);
      d.addEventListener('keydown',onCIKey);d.addEventListener('copy',onCICopy);
      d.addEventListener('focus',()=>cellEditing.set(d,false));
      d.addEventListener('input',()=>{
      if(!cellEditing.get(d)){pushUndo();}
      cellEditing.set(d,true);scheduleSave();
    });
      const handle=document.createElement('div');handle.className='handle';
      handle.innerHTML='<span></span><span></span><span></span>';
      handle.addEventListener('mousedown',onHandleDown);
      cell.appendChild(d);cell.appendChild(handle);grid.appendChild(cell);
    }
  }
  document.getElementById('rn').value=NR;
  document.getElementById('cn').value=NC;
  document.getElementById('sw-hdr').classList.toggle('on',hasHdr);
  document.getElementById('sw-fit').classList.toggle('on',!fitMode);
  refreshSel();
  if(!skipSave)scheduleSave();
}

function snap(){
  const o={};
  grid.querySelectorAll('.g-cell').forEach(cell=>{
    const r=+cell.dataset.r,c=+cell.dataset.c,d=cell.querySelector('.ci');
    if(d)o[key(r,c)]={
      h:d.innerHTML,a:d.style.textAlign,fw:d.style.fontWeight,fs:d.style.fontStyle,
      tc:d.style.color||'',bg:cell.dataset.cellColor||''
    };
  });
  return o;
}
function applySnap(prev,skipSave){
  Object.entries(prev).forEach(([k,v])=>{
    const[r,c]=pk(k);const d=gCI(r,c);const cell=gCell(r,c);
    if(d){d.innerHTML=v.h;d.style.textAlign=v.a||'';d.style.fontWeight=v.fw||'';d.style.fontStyle=v.fs||'';d.style.color=v.tc||'';}
    if(cell&&v.bg){cell.dataset.cellColor=v.bg;cell.style.background=lightenHex(v.bg);}else if(cell){delete cell.dataset.cellColor;cell.style.background='';}
  });
  if(!skipSave)scheduleSave();
}
function writeCell(r,c,v){
  const d=gCI(r,c);const cell=gCell(r,c);if(!d||!v)return;
  d.innerHTML=v.h;d.style.textAlign=v.a||'';d.style.fontWeight=v.fw||'';d.style.fontStyle=v.fs||'';d.style.color=v.tc||'';
  if(cell){if(v.bg){cell.dataset.cellColor=v.bg;cell.style.background=lightenHex(v.bg);}else{delete cell.dataset.cellColor;cell.style.background='';}}
}

// ── Size ──────────────────────────────────────────────────────────────────────
function chgSize(t,d){pushUndo();const p=snap();if(t==='r')NR=Math.max(1,NR+d);else NC=Math.max(1,NC+d);build(true);applySnap(p);clearSel();}
function setSize(t,input){pushUndo();
  const val=Math.max(1,Math.min(99,parseInt(input.value)||1));
  input.value=val;
  const p=snap();
  if(t==='r')NR=val;else NC=val;
  build(true);applySnap(p);clearSel();
}
function togFit(){pushUndo();fitMode=!fitMode;const p=snap();build(true);applySnap(p,true);scheduleSave();}
function doDelRow(dr){if(NR<=1)return;pushUndo();const p=snap();NR--;build(true);let nr=0;for(let r=0;r<NR;r++){let or=nr;if(or>=dr)or++;for(let c=0;c<NC;c++)writeCell(r,c,p[key(or,c)]);nr++;}clearSel();scheduleSave();}
function doDelCol(dc){if(NC<=1)return;pushUndo();const p=snap();NC--;build(true);for(let r=0;r<NR;r++){let nc=0;for(let oc=0;oc<NC+1;oc++){if(oc===dc)continue;writeCell(r,nc,p[key(r,oc)]);nc++;}}clearSel();scheduleSave();}
function doAddRow(ins){pushUndo();const p=snap();NR++;build(true);for(let r=NR-1;r>ins;r--)for(let c=0;c<NC;c++)writeCell(r,c,p[key(r-1,c)]);for(let c=0;c<NC;c++){const d=gCI(ins,c);const cell=gCell(ins,c);if(d){d.innerHTML='';d.style.cssText='';}if(cell){cell.style.background='';delete cell.dataset.cellColor;}}clearSel();scheduleSave();}
function doAddCol(ins){pushUndo();const p=snap();NC++;build(true);for(let r=0;r<NR;r++){for(let c=NC-1;c>ins;c--)writeCell(r,c,p[key(r,c-1)]);const d=gCI(r,ins);const cell=gCell(r,ins);if(d){d.innerHTML='';d.style.cssText='';}if(cell){cell.style.background='';delete cell.dataset.cellColor;}}clearSel();scheduleSave();}

// ── Import ────────────────────────────────────────────────────────────────────
function importFromFile(){document.getElementById('file-input').click();}
function handleFileInput(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const txt=ev.target.result,ext=f.name.split('.').pop().toLowerCase();
    if(ext==='html'||ext==='htm')importHTML(txt);
    else importDelimited(txt,ext==='tsv'||txt.includes('\t')?'\t':',');
  };
  reader.readAsText(f);e.target.value='';
}
async function importFromClipboard(){
  try{
    const txt=await navigator.clipboard.readText();
    if(!txt.trim()){toast('Clipboard is empty');return;}
    if(/<table/i.test(txt))importHTML(txt);
    else importDelimited(txt,txt.includes('\t')?'\t':',');
  }catch(e){toast('Could not read clipboard');}
}
function importHTML(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const tbl=doc.querySelector('table');if(!tbl){toast('No table found');return;}
  const rows=[...tbl.querySelectorAll('tr')];if(!rows.length)return;
  loadData(rows.map(tr=>[...tr.querySelectorAll('th,td')].map(td=>({
    text:td.innerText||td.textContent||'',
    bold:td.tagName==='TH'||td.style.fontWeight==='bold',
    italic:td.style.fontStyle==='italic',
    align:td.style.textAlign||'',
    tc:td.style.color||'',
    bg:td.style.backgroundColor||''
  }))),true);
}
function importDelimited(txt,delim){
  const lines=txt.trim().split(/\r?\n/);
  loadData(lines.map(l=>l.split(delim).map(v=>({text:v.replace(/^"|"$/g,'').replace(/""/g,'"'),bold:false,italic:false,align:'',tc:'',bg:''}))),false);
}
function loadData(data,fromHTML){
  if(!data.length)return;
  const nr=data.length,nc=Math.max(...data.map(r=>r.length));
  NR=nr;NC=nc;hasHdr=fromHTML;
  const prev={};
  data.forEach((row,r)=>row.forEach((cell,c)=>{
    prev[key(r,c)]={h:cell.text,a:cell.align||'',fw:cell.bold?'bold':'',fs:cell.italic?'italic':'',tc:cell.tc||'',bg:cell.bg||''};
  }));
  grid.innerHTML='';
  build(true);applySnap(prev,true);saveNow();toast('Imported '+nr+'×'+nc+' table');
}

// ── Selection ─────────────────────────────────────────────────────────────────
function cPosFromCI(d){const c=d.closest('.g-cell');if(!c)return null;return[+c.dataset.r,+c.dataset.c];}
function focusCell(r,c){
  const d=gCI(r,c);if(!d)return;
  clearSel();addSel(r,c);refreshSel();d.focus();
  const rng=document.createRange();rng.selectNodeContents(d);rng.collapse(false);
  const s=window.getSelection();s.removeAllRanges();s.addRange(rng);
  updateColorIndicators();
}
function clearSel(){sel.clear();lastSel=null;selAnchor=null;selLive=null;refreshSel();}
function addSel(r,c){sel.add(key(r,c));lastSel=[r,c];}
function refreshSel(){
  const rect=isRectSel();
  grid.querySelectorAll('.g-cell').forEach(cell=>{
    const k=key(+cell.dataset.r,+cell.dataset.c),inSel=sel.has(k);
    cell.classList.toggle('sel',inSel&&rect);
    cell.classList.toggle('sel-disj',inSel&&!rect);
  });
  updateColorIndicators();
}
function selRange(r1,c1,r2,c2){
  for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++)
    for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++)
      sel.add(key(r,c));
  lastSel=[r2,c2];refreshSel();
}

function onCIDown(e){
  if(e.target.closest('.handle'))return;
  const pos=cPosFromCI(e.currentTarget);if(!pos)return;const[r,c]=pos;
  if(e.shiftKey&&lastSel){selRange(lastSel[0],lastSel[1],r,c);e.preventDefault();return;}
  if(e.ctrlKey||e.metaKey){sel.has(key(r,c))?sel.delete(key(r,c)):addSel(r,c);refreshSel();e.preventDefault();return;}
  clearSel();addSel(r,c);refreshSel();
  isSelDrag=true;selDragStart=[r,c];
  document.addEventListener('mouseup',()=>{isSelDrag=false;},{once:true});
}
function onCIOver(e){if(!isSelDrag||!selDragStart)return;const pos=cPosFromCI(e.currentTarget);if(!pos)return;sel.clear();selRange(selDragStart[0],selDragStart[1],pos[0],pos[1]);}

function onCIKey(e){
  const pos=cPosFromCI(e.currentTarget);if(!pos)return;
  const[r,c]=pos,d=e.currentTarget;
  const editing=cellEditing.get(d)===true,multi=sel.size>1;
  if(multi){
    if(e.key==='Tab'){e.preventDefault();if(e.shiftKey){if(c>0)focusCell(r,c-1);else if(r>0)focusCell(r-1,NC-1);}else{if(c<NC-1)focusCell(r,c+1);else if(r<NR-1)focusCell(r+1,0);}return;}
    if(e.key==='ArrowUp'){e.preventDefault();if(e.shiftKey&&r>0){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0]-1,selLive[1]];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(r>0)focusCell(r-1,c);return;}
    if(e.key==='ArrowDown'){e.preventDefault();if(e.shiftKey&&r<NR-1){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0]+1,selLive[1]];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(r<NR-1)focusCell(r+1,c);return;}
    if(e.key==='ArrowLeft'){e.preventDefault();if(e.shiftKey&&c>0){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0],selLive[1]-1];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(c>0)focusCell(r,c-1);return;}
    if(e.key==='ArrowRight'){e.preventDefault();if(e.shiftKey&&c<NC-1){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0],selLive[1]+1];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(c<NC-1)focusCell(r,c+1);return;}
    if(e.key==='Delete'){e.preventDefault();pushUndo();sel.forEach(k=>{const[r2,c2]=pk(k);const d2=gCI(r2,c2);if(d2)d2.innerHTML='';});scheduleSave();return;}
    if((e.ctrlKey||e.metaKey)&&e.key==='c'){e.preventDefault();copySelection();return;}
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();return;}
    if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();applyFmt('bold');return;}
    if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();applyFmt('italic');return;}
    if(!e.ctrlKey&&!e.metaKey&&(e.key.length<=1||e.key==='Backspace'||e.key==='Enter')){e.preventDefault();}
    return;
  }
  if(e.key==='Tab'){e.preventDefault();if(e.shiftKey){if(c>0)focusCell(r,c-1);else if(r>0)focusCell(r-1,NC-1);}else{if(c<NC-1)focusCell(r,c+1);else if(r<NR-1)focusCell(r+1,0);}return;}
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(r<NR-1)focusCell(r+1,c);return;}
  if(e.key==='ArrowUp'){e.preventDefault();if(e.shiftKey&&r>0){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0]-1,selLive[1]];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(r>0)focusCell(r-1,c);return;}
  if(e.key==='ArrowDown'){e.preventDefault();if(e.shiftKey&&r<NR-1){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0]+1,selLive[1]];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(r<NR-1)focusCell(r+1,c);return;}
  if(e.key==='ArrowLeft'&&!editing){e.preventDefault();if(e.shiftKey&&c>0){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0],selLive[1]-1];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(c>0)focusCell(r,c-1);return;}
  if(e.key==='ArrowRight'&&!editing){e.preventDefault();if(e.shiftKey&&c<NC-1){if(!selAnchor)selAnchor=[r,c];if(!selLive)selLive=[r,c];selLive=[selLive[0],selLive[1]+1];selLive[0]=Math.max(0,Math.min(NR-1,selLive[0]));selLive[1]=Math.max(0,Math.min(NC-1,selLive[1]));sel.clear();selRange(selAnchor[0],selAnchor[1],selLive[0],selLive[1]);const d2=gCI(selLive[0],selLive[1]);if(d2)d2.focus();}else if(c<NC-1)focusCell(r,c+1);return;}
  if(e.key==='Delete'&&!editing){e.preventDefault();pushUndo();const d2=gCI(r,c);if(d2){d2.innerHTML='';scheduleSave();}return;}
  if(e.key==='Backspace'){cellEditing.set(d,true);return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();applyFmt('bold');return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();applyFmt('italic');return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='c'){e.preventDefault();copySelection();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();return;}
  if(e.key.length===1&&!e.ctrlKey&&!e.metaKey)cellEditing.set(d,true);
}
function onCICopy(e){if(sel.size!==1)return;e.preventDefault();e.clipboardData.setData('text/plain',window.getSelection().toString());}

function copySelection(){
  const arr=[...sel].map(pk);
  const minR=Math.min(...arr.map(p=>p[0])),maxR=Math.max(...arr.map(p=>p[0]));
  const minC=Math.min(...arr.map(p=>p[1])),maxC=Math.max(...arr.map(p=>p[1]));
  const rows=[];for(let r=minR;r<=maxR;r++){const row=[];for(let c=minC;c<=maxC;c++){const d=gCI(r,c);row.push(d?d.innerText.trim():'');}rows.push(row);}
  const tsv=rows.map(r=>r.join('\t')).join('\n');
  const hr=[];for(let r=minR;r<=maxR;r++){const row=[];for(let c=minC;c<=maxC;c++){const d=gCI(r,c);const cell=gCell(r,c);const tag=(r===0&&hasHdr&&minR===0)?'th':'td';row.push(`<${tag}${csaFull(d,cell)}>${d?d.innerHTML:''}</${tag}>`);}hr.push('<tr>'+row.join('')+'</tr>');}
  navigator.clipboard.write([new ClipboardItem({'text/plain':new Blob([tsv],{type:'text/plain'}),'text/html':new Blob(['<table>'+hr.join('')+'</table>'],{type:'text/html'})})]).then(()=>toast('Copied')).catch(()=>navigator.clipboard.writeText(tsv).then(()=>toast('Copied')));
}

function csa(d){if(!d)return'';const p=[];if(d.style.textAlign)p.push('text-align:'+d.style.textAlign);if(d.style.fontWeight==='bold')p.push('font-weight:bold');if(d.style.fontStyle==='italic')p.push('font-style:italic');return p.length?' style="'+p.join(';')+'"':'';}
function csaFull(d,cell){
  const p=[];
  if(d){if(d.style.textAlign)p.push('text-align:'+d.style.textAlign);if(d.style.fontWeight==='bold')p.push('font-weight:bold');if(d.style.fontStyle==='italic')p.push('font-style:italic');if(d.style.color)p.push('color:'+d.style.color);}
  if(cell&&cell.style.background)p.push('background:'+cell.style.background);
  return p.length?' style="'+p.join(';')+'"':'';
}
function ciStyle(d){if(!d)return'';const p=[];if(d.style.fontWeight==='bold')p.push('font-weight:bold');if(d.style.fontStyle==='italic')p.push('font-style:italic');if(d.style.textAlign)p.push('text-align:'+d.style.textAlign);if(d.style.color)p.push('color:'+d.style.color);return p.join(';');}
function getSelBounds(){const arr=[...sel].map(pk);if(!arr.length)return null;return{minR:Math.min(...arr.map(p=>p[0])),maxR:Math.max(...arr.map(p=>p[0])),minC:Math.min(...arr.map(p=>p[1])),maxC:Math.max(...arr.map(p=>p[1]))};}

// ── Scroll ────────────────────────────────────────────────────────────────────
function startScrollLoop(){
  if(scrollRaf)return;
  function tick(){if(!dragActive){scrollRaf=null;return;}if(scrollVx||scrollVy){outer.scrollLeft+=scrollVx;outer.scrollTop+=scrollVy;}scrollRaf=requestAnimationFrame(tick);}
  scrollRaf=requestAnimationFrame(tick);
}
function stopScrollLoop(){if(scrollRaf){cancelAnimationFrame(scrollRaf);scrollRaf=null;}scrollVx=0;scrollVy=0;}
function updateScrollVelocity(cx,cy){
  const rect=outer.getBoundingClientRect();scrollVx=0;scrollVy=0;
  const dl=cx-rect.left,dr=rect.right-cx,dt=cy-rect.top,db=rect.bottom-cy;
  if(dl<SCROLL_ZONE)scrollVx=-Math.round(SCROLL_MAX*(1-dl/SCROLL_ZONE));
  else if(dr<SCROLL_ZONE)scrollVx=Math.round(SCROLL_MAX*(1-dr/SCROLL_ZONE));
  if(dt<SCROLL_ZONE)scrollVy=-Math.round(SCROLL_MAX*(1-dt/SCROLL_ZONE));
  else if(db<SCROLL_ZONE)scrollVy=Math.round(SCROLL_MAX*(1-db/SCROLL_ZONE));
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function onHandleDown(e){
  if(!isRectSel())return;
  e.preventDefault();e.stopPropagation();closePop();closeColorPop();
  const cell=e.currentTarget.closest('.g-cell'),hr=+cell.dataset.r,hc=+cell.dataset.c;
  if(!sel.has(key(hr,hc))){clearSel();addSel(hr,hc);refreshSel();}
  const bounds=getSelBounds();
  dragOffR=hr-bounds.minR;dragOffC=hc-bounds.minC;
  dragSelKeys=[...sel];
  dragSelKeys.forEach(k=>{const[r2,c2]=pk(k);gCell(r2,c2)?.classList.add('drag-src');});
  dragActive=true;buildGhost(bounds,e);
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragUp,{once:true});
  startScrollLoop();
}
function buildGhost(bounds,e){
  const rows=bounds.maxR-bounds.minR+1,cols=bounds.maxC-bounds.minC+1;
  dragGhostEl=document.createElement('div');dragGhostEl.className='ghost-grid';
  dragGhostEl.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  dragGhostEl.style.position='fixed';dragGhostEl.style.minWidth='60px';
  for(let r=bounds.minR;r<=bounds.maxR;r++)for(let c=bounds.minC;c<=bounds.maxC;c++){
    const gc=document.createElement('div');gc.className='ghost-cell';
    const d=gCI(r,c);const cell=gCell(r,c);
    if(d){gc.innerHTML=d.innerHTML;const s=ciStyle(d);if(s)gc.style.cssText+=';'+s;}
    if(cell&&cell.style.background)gc.style.background=cell.style.background;
    dragGhostEl.appendChild(gc);
  }
  const anchor=gCell(bounds.minR+dragOffR,bounds.minC+dragOffC)?.getBoundingClientRect()||{width:80};
  dragGhostEl.style.left=(e.clientX-anchor.width*cols+anchor.width-10)+'px';
  dragGhostEl.style.top=(e.clientY-16)+'px';
  document.body.appendChild(dragGhostEl);
}
function getDropBounds(anchorCell){
  const ar=+anchorCell.dataset.r,ac=+anchorCell.dataset.c,bounds=getSelBounds();
  const rows=bounds.maxR-bounds.minR+1,cols=bounds.maxC-bounds.minC+1;
  const destR=ar-dragOffR,destC=ac-dragOffC;
  if(destR<0||destC<0||destR+rows>NR||destC+cols>NC)return null;
  return{r:destR,c:destC,rows,cols};
}
function clearDropHL(){grid.querySelectorAll('.g-cell').forEach(c=>c.classList.remove('drop-primary','drop-secondary'));}
function applyDropHL(db,tc){for(let r=db.r;r<db.r+db.rows;r++)for(let c=db.c;c<db.c+db.cols;c++){const cell=gCell(r,c);if(!cell)continue;cell.classList.add(cell===tc?'drop-primary':'drop-secondary');}}
function onDragMove(e){
  if(!dragGhostEl)return;
  const bounds=getSelBounds(),anchor=gCell(bounds.minR+dragOffR,bounds.minC+dragOffC)?.getBoundingClientRect()||{width:80};
  dragGhostEl.style.left=(e.clientX-anchor.width*(bounds.maxC-bounds.minC+1)+anchor.width-10)+'px';
  dragGhostEl.style.top=(e.clientY-16)+'px';
  updateScrollVelocity(e.clientX,e.clientY);
  const el=document.elementFromPoint(e.clientX,e.clientY),cell=el?.closest('.g-cell');
  clearDropHL();dragTargetCell=null;
  if(cell){const db=getDropBounds(cell);dragGhostEl.classList.toggle('bad',!db);if(db){dragTargetCell=cell;applyDropHL(db,cell);}}
  else dragGhostEl.classList.remove('bad');
}
function animFly(fromRect,toCell){
  const tRect=toCell.getBoundingClientRect(),dx=fromRect.left-tRect.left,dy=fromRect.top-tRect.top;
  if(dx===0&&dy===0)return;
  const ci=toCell.querySelector('.ci');
  ci.classList.remove('ci-flying');ci.style.setProperty('--fly-from',`translate(${dx}px,${dy}px)`);
  void ci.offsetWidth;ci.classList.add('ci-flying');
  ci.addEventListener('animationend',()=>ci.classList.remove('ci-flying'),{once:true});
}
function onDragUp(){
  document.removeEventListener('mousemove',onDragMove);stopScrollLoop();
  if(dragGhostEl){dragGhostEl.remove();dragGhostEl=null;}
  dragSelKeys.forEach(k=>{const[r,c]=pk(k);gCell(r,c)?.classList.remove('drag-src');});
  clearDropHL();
  const db=dragTargetCell?getDropBounds(dragTargetCell):null;
  if(db){pushUndo();
    const bounds=getSelBounds();
    const srcPos=[];for(let r=bounds.minR;r<=bounds.maxR;r++)for(let c=bounds.minC;c<=bounds.maxC;c++)srcPos.push([r,c]);
    const dstPos=[];for(let r=db.r;r<db.r+db.rows;r++)for(let c=db.c;c<db.c+db.cols;c++)dstPos.push([r,c]);
    const touched=new Map();
    [...srcPos,...dstPos].forEach(([r,c])=>{const k=key(r,c);if(!touched.has(k)){const d=gCI(r,c);const cell=gCell(r,c);touched.set(k,d?{h:d.innerHTML,a:d.style.textAlign,fw:d.style.fontWeight,fs:d.style.fontStyle,tc:d.style.color||'',bg:cell?.dataset.cellColor||''}:{h:'',a:'',fw:'',fs:'',tc:'',bg:''});}});
    const rects=new Map();touched.forEach((_,k)=>{const[r,c]=pk(k);const cell=gCell(r,c);if(cell)rects.set(k,cell.getBoundingClientRect());});
    const newState=new Map(touched);
    srcPos.forEach(([sr,sc],i)=>newState.set(key(...dstPos[i]),touched.get(key(sr,sc))));
    const srcSet=new Set(srcPos.map(([r,c])=>key(r,c))),dstSet=new Set(dstPos.map(([r,c])=>key(r,c)));
    const onlySrc=srcPos.filter(([r,c])=>!dstSet.has(key(r,c))),onlyDst=dstPos.filter(([r,c])=>!srcSet.has(key(r,c)));
    onlySrc.forEach(([sr,sc],i)=>newState.set(key(sr,sc),i<onlyDst.length?touched.get(key(...onlyDst[i])):{h:'',a:'',fw:'',fs:'',tc:'',bg:''}));
    newState.forEach((v,k)=>{
      const[r,c]=pk(k);let fk=null;
      srcPos.forEach(([sr,sc],i)=>{if(key(...dstPos[i])===k)fk=key(sr,sc);});
      onlySrc.forEach(([sr,sc],i)=>{if(key(sr,sc)===k&&i<onlyDst.length)fk=key(...onlyDst[i]);});
      if(fk&&fk!==k){const fr=rects.get(fk);if(fr)animFly(fr,gCell(r,c));}
      const d=gCI(r,c);const cell=gCell(r,c);
      if(d){d.innerHTML=v.h;d.style.textAlign=v.a||'';d.style.fontWeight=v.fw||'';d.style.fontStyle=v.fs||'';d.style.color=v.tc||'';}
      if(cell){if(v.bg){cell.dataset.cellColor=v.bg;cell.style.background=lightenHex(v.bg);}else{delete cell.dataset.cellColor;cell.style.background='';}}
    });
    sel=new Set(dstPos.map(([r,c])=>key(r,c)));lastSel=[db.r+db.rows-1,db.c+db.cols-1];refreshSel();scheduleSave();
  }
  dragActive=false;dragSelKeys=[];dragTargetCell=null;
}

// ── Format & toggles ──────────────────────────────────────────────────────────
function applyFmt(cmd){
  pushUndo();
  if(sel.size>=1){sel.forEach(k=>{const[r,c]=pk(k);const d=gCI(r,c);if(!d)return;if(cmd==='bold')d.style.fontWeight=d.style.fontWeight==='bold'?'':'bold';if(cmd==='italic')d.style.fontStyle=d.style.fontStyle==='italic'?'':'italic';});scheduleSave();}
  else document.execCommand(cmd);
}
function applyAlign(a){pushUndo();sel.forEach(k=>{const[r,c]=pk(k);const d=gCI(r,c);if(d)d.style.textAlign=a;});scheduleSave();}
function togHdr(){pushUndo();hasHdr=!hasHdr;grid.querySelectorAll('.g-cell').forEach(cell=>{if(+cell.dataset.r===0)cell.classList.toggle('hdr',hasHdr);});document.getElementById('sw-hdr').classList.toggle('on',hasHdr);scheduleSave();}

// ── Export ────────────────────────────────────────────────────────────────────
function getRows(){const rows=[];for(let r=0;r<NR;r++){const row=[];for(let c=0;c<NC;c++){const d=gCI(r,c);row.push(d?d.innerText.trim():'');}rows.push(row);}return rows;}
function escCSV(v){return/[,"\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function colAlign(c){if(!hasHdr)return'';const d=gCI(0,c);return d?d.style.textAlign:'';}
function mdAlignRow(w){return'| '+w.map((n,c)=>{const a=colAlign(c);if(a==='center')return':'+'-'.repeat(Math.max(1,n-2))+':';if(a==='right')return'-'.repeat(Math.max(1,n-1))+':';return'-'.repeat(n);}).join(' | ')+' |';}
function buildMD(){const d=getRows();if(!d.length)return'';const w=d[0].map((_,c)=>Math.max(...d.map(r=>(r[c]||'').length),3));const lines=d.map(r=>'| '+r.map((v,c2)=>v.padEnd(w[c2])).join(' | ')+' |');lines.splice(1,0,mdAlignRow(w));return lines.join('\n');}
function buildHTML(){
  let h='<table>\n';
  for(let r=0;r<NR;r++){
    h+='  <tr>';
    for(let c=0;c<NC;c++){
      const d=gCI(r,c);const cell=gCell(r,c);
      const tag=(r===0&&hasHdr)?'th':'td';
      h+=`<${tag}${csaFull(d,cell)}>${d?d.innerHTML:''}</${tag}>`;
    }
    h+='</tr>\n';
  }
  return h+'</table>';
}
function doExport(type){
  const d=getRows();let content='',filename='',mime='text/plain';
  if(type==='csv'){content=d.map(r=>r.map(escCSV).join(',')).join('\n');filename='table.csv';mime='text/csv';}
  else if(type==='md'){content=buildMD();filename='table.md';}
  else if(type==='html'){content=buildHTML();filename='table.html';mime='text/html';}
  else if(type==='tsv'){content=d.map(r=>r.join('\t')).join('\n');filename='table.tsv';}
  else if(type==='cells'){
    const tsv=d.map(r=>r.join('\t')).join('\n');
    const ho='<table>'+d.map((r,ri)=>'<tr>'+r.map((v,ci2)=>{const tag=(ri===0&&hasHdr)?'th':'td';const dEl=gCI(ri,ci2);const cEl=gCell(ri,ci2);return`<${tag}${csaFull(dEl,cEl)}>${v}</${tag}>`;}).join('')+'</tr>').join('')+'</table>';
    navigator.clipboard.write([new ClipboardItem({'text/plain':new Blob([tsv],{type:'text/plain'}),'text/html':new Blob([ho],{type:'text/html'})})]).then(()=>toast('Copied as cells')).catch(()=>navigator.clipboard.writeText(tsv).then(()=>toast('Copied')));return;
  }
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=filename;a.click();toast('Downloaded '+filename);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init(){
  const saved=loadSaved();
  if(saved){
    NR=saved.NR||4;NC=saved.NC||4;
    hasHdr=saved.hasHdr!==undefined?saved.hasHdr:true;
    fitMode=saved.fitMode!==undefined?saved.fitMode:true;
    build(true);
    if(saved.cells)applySnap(saved.cells,true);
    toast('Restored saved table');
  } else {
    build(true);
  }
  // Seed the undo stack with the initial state
  undoStack=[{NR,NC,hasHdr,fitMode,cells:snap()}];undoPointer=0;updateUndoBtn();
})();
</script>
